services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lantern
    ports:
      - "5432:5432"
    volumes:
      - ./backend/postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command:
      ["uvicorn", "src.server:app", "--host=0.0.0.0", "--port=8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@db:5432/lantern
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-adminsdk.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro
      - ~/.secrets/lantern-firebase-adminsdk.json:/run/secrets/firebase-adminsdk.json:ro

  backend-worker:
    build: ./backend
    command: ["python", "-m", "src.transactions_sync_runner"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@db:5432/lantern
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-adminsdk.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro
      - ~/.secrets/lantern-firebase-adminsdk.json:/run/secrets/firebase-adminsdk.json:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_HOST: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
