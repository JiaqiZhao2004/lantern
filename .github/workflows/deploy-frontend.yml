name: Deploy static site to S3

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment_name: production
          - environment_name: public
    environment: ${{ matrix.environment_name }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_IDS: ${{ vars.CLOUDFRONT_DISTRIBUTION_IDS }}
      VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE }}
      VITE_ACCESS_CONTACT: ${{ vars.VITE_ACCESS_CONTACT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Validate deployment configuration
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_TO_ASSUME"
          test -n "$FRONTEND_S3_BUCKET"
          test -n "$CLOUDFRONT_DISTRIBUTION_IDS"
          test -n "$VITE_AUTH_MODE"
          case "$VITE_AUTH_MODE" in
            open|restricted) ;;
            *)
              echo "VITE_AUTH_MODE must be 'open' or 'restricted'"
              exit 1
              ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload versioned assets
        run: |
          aws s3 sync ./frontend/dist "s3://${FRONTEND_S3_BUCKET}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload HTML shell
        run: |
          aws s3 cp ./frontend/dist/index.html "s3://${FRONTEND_S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          IFS=',' read -ra DISTRIBUTION_IDS <<< "$CLOUDFRONT_DISTRIBUTION_IDS"
          for distribution_id in "${DISTRIBUTION_IDS[@]}"; do
            aws cloudfront create-invalidation \
              --distribution-id "$distribution_id" \
              --paths "/*"
          done
