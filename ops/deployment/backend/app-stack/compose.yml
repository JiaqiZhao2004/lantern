services:
  nginx:
    image: nginx:1.29-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NGINX_BIND_PORT:?set NGINX_BIND_PORT in compose.env}:8080"
    volumes:
      - ${APP_STACK_ENV_DIR:?set APP_STACK_ENV_DIR in compose.env}/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health/live >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      backend-shared:
        aliases:
          - ${COMPOSE_PROJECT_NAME:?set COMPOSE_PROJECT_NAME in compose.env}-nginx
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE in compose.env}
    command: ["uvicorn", "src.server:app", "--host=0.0.0.0", "--port=8000"]
    env_file:
      - ${APP_STACK_ENV_DIR:?set APP_STACK_ENV_DIR in compose.env}/backend.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-adminsdk.json
      AWS_SHARED_CREDENTIALS_FILE: /run/aws/credentials
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${FIREBASE_ADMIN_CREDENTIALS_PATH:?set FIREBASE_ADMIN_CREDENTIALS_PATH in compose.env}:/run/secrets/firebase-adminsdk.json:ro
      - ${AWS_SHARED_CREDENTIALS_PATH:?set AWS_SHARED_CREDENTIALS_PATH in compose.env}:/run/aws/credentials:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/live').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      backend-shared:
        aliases:
          - ${COMPOSE_PROJECT_NAME:?set COMPOSE_PROJECT_NAME in compose.env}-backend
    restart: unless-stopped

  worker:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE in compose.env}
    command: ["python", "-m", "src.transactions_sync_runner"]
    env_file:
      - ${APP_STACK_ENV_DIR:?set APP_STACK_ENV_DIR in compose.env}/backend.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-adminsdk.json
      AWS_SHARED_CREDENTIALS_FILE: /run/aws/credentials
      SYNC_RUNNER_HEARTBEAT_PATH: /var/lib/node_exporter/textfile_collector/${COMPOSE_PROJECT_NAME:?set COMPOSE_PROJECT_NAME in compose.env}-worker-heartbeat.prom
      SYNC_RUNNER_HEARTBEAT_STACK: ${OBSERVABILITY_STACK_LABEL:?set OBSERVABILITY_STACK_LABEL in compose.env}
      SYNC_RUNNER_HEARTBEAT_MAX_AGE_SECONDS: ${SYNC_RUNNER_HEARTBEAT_MAX_AGE_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${FIREBASE_ADMIN_CREDENTIALS_PATH:?set FIREBASE_ADMIN_CREDENTIALS_PATH in compose.env}:/run/secrets/firebase-adminsdk.json:ro
      - ${AWS_SHARED_CREDENTIALS_PATH:?set AWS_SHARED_CREDENTIALS_PATH in compose.env}:/run/aws/credentials:ro
      - ${OBSERVABILITY_TEXTFILE_COLLECTOR_PATH:?set OBSERVABILITY_TEXTFILE_COLLECTOR_PATH in compose.env}:/var/lib/node_exporter/textfile_collector
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import os, sys, time; p = Path(os.environ['SYNC_RUNNER_HEARTBEAT_PATH']); max_age = float(os.getenv('SYNC_RUNNER_HEARTBEAT_MAX_AGE_SECONDS', '60')); sys.exit(0 if p.exists() and (time.time() - p.stat().st_mtime) <= max_age else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      backend-shared:
        aliases:
          - ${COMPOSE_PROJECT_NAME:?set COMPOSE_PROJECT_NAME in compose.env}-worker
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    env_file:
      - ${APP_STACK_ENV_DIR:?set APP_STACK_ENV_DIR in compose.env}/db.env
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      backend-shared:
        aliases:
          - ${COMPOSE_PROJECT_NAME:?set COMPOSE_PROJECT_NAME in compose.env}-db
    restart: unless-stopped

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:?set POSTGRES_VOLUME_NAME in compose.env}

networks:
  backend-shared:
    external: true
    name: ${BACKEND_SHARED_NETWORK:?set BACKEND_SHARED_NETWORK in compose.env}
