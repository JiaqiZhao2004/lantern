groups:
  - name: backend-availability
    rules:
      - alert: LanternBackendReadinessDown
        expr: probe_success{job="blackbox-local-http",probe="ready"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Lantern backend readiness is down"
          description: "The {{ $labels.stack }} nginx /health/ready probe has failed for at least 5 minutes."

      - alert: LanternBackendLivenessDown
        expr: probe_success{job="blackbox-local-http",probe="live"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Lantern backend liveness is down"
          description: "The {{ $labels.stack }} nginx /health/live probe has failed for at least 5 minutes."

      - alert: LanternBackend5xxResponses
        expr: sum by (stack) (increase(lantern_http_requests_total{status_code=~"5.."}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Lantern backend is returning 5xx responses"
          description: "At least one {{ $labels.stack }} backend API request returned a 5xx response over the last 5 minutes."

      - alert: LanternBackendRepeated5xxResponses
        expr: sum by (stack) (increase(lantern_http_requests_total{status_code=~"5.."}[10m])) >= 5
        labels:
          severity: critical
        annotations:
          summary: "Lantern backend is repeatedly returning 5xx responses"
          description: "At least 5 {{ $labels.stack }} backend API requests returned 5xx responses over the last 10 minutes."

      - alert: LanternSyncRunnerHeartbeatStale
        expr: max by (stack) (time() - lantern_sync_runner_last_heartbeat_timestamp_seconds{stack=~"production|public"}) > 120
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Lantern sync runner heartbeat is stale"
          description: "The {{ $labels.stack }} transaction sync runner heartbeat is older than 2 minutes."

      - alert: LanternProductionSyncRunnerHeartbeatMissing
        expr: absent(lantern_sync_runner_last_heartbeat_timestamp_seconds{stack="production"})
        for: 2m
        labels:
          severity: critical
          stack: production
        annotations:
          summary: "Lantern sync runner heartbeat is missing"
          description: "The production transaction sync runner heartbeat metric is missing."

      - alert: LanternPublicSyncRunnerHeartbeatMissing
        expr: absent(lantern_sync_runner_last_heartbeat_timestamp_seconds{stack="public"})
        for: 2m
        labels:
          severity: critical
          stack: public
        annotations:
          summary: "Lantern sync runner heartbeat is missing"
          description: "The public transaction sync runner heartbeat metric is missing."

      - alert: LanternSyncJobMetricsCollectionFailing
        expr: lantern_sync_jobs_metrics_collection_success == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Lantern SyncJob metrics collection is failing"
          description: "The backend /metrics endpoint cannot collect aggregate SyncJob metrics."

      - alert: LanternSyncJobQueueStale
        expr: lantern_sync_jobs_oldest_queued_age_seconds > 3600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Lantern SyncJob queue is stale"
          description: "The oldest queued SyncJob has been queued for more than 1 hour."

      - alert: LanternSyncJobRunningStale
        expr: lantern_sync_jobs_oldest_running_age_seconds > 7200
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Lantern SyncJob appears stuck running"
          description: "The oldest running SyncJob has been running for more than 2 hours."

      - alert: LanternRecentDeadLetterSyncJob
        expr: lantern_sync_jobs_last_dead_letter_timestamp_seconds > 0 and time() - lantern_sync_jobs_last_dead_letter_timestamp_seconds < 86400
        labels:
          severity: warning
        annotations:
          summary: "Lantern has recent dead-letter SyncJob activity"
          description: "A SyncJob entered dead-letter state within the last 24 hours."

      - alert: LanternSyncJobCompletionStale
        expr: lantern_sync_jobs_last_completed_age_hours > 72
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Lantern has not completed a SyncJob in more than 3 days"
          description: "The most recent succeeded SyncJob is older than 72 hours."

      - alert: LanternSyncJobCompletionVeryStale
        expr: lantern_sync_jobs_last_completed_age_hours > 120
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Lantern has not completed a SyncJob in more than 5 days"
          description: "The most recent succeeded SyncJob is older than 120 hours."
