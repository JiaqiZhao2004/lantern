global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          stack: production
      - targets:
          - postgres-exporter-public:9187
        labels:
          stack: public

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - lantern-prod-backend:8000
        labels:
          stack: production
      - targets:
          - lantern-public-backend:8000
        labels:
          stack: public

  - job_name: blackbox-local-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://lantern-prod-nginx:8080/health/live
        labels:
          stack: production
          probe: live
      - targets:
          - http://lantern-prod-nginx:8080/health/ready
        labels:
          stack: production
          probe: ready
      - targets:
          - http://lantern-public-nginx:8080/health/live
        labels:
          stack: public
          probe: live
      - targets:
          - http://lantern-public-nginx:8080/health/ready
        labels:
          stack: public
          probe: ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
